<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="style.css" rel="stylesheet">
    <title>TelaLogin</title>
</head>

<body>
    <main>
    <header class="cabecalho">
        <img class="logo" src="https://img.icons8.com/doodle/65/000000/spirit-fanfiction.png" width="auto"
            height="auto">
        <p>Seja Bem Vindo a nossa comunidade</p>
        <p>Faça parte agora de nossas redes sociais</p>
        <div class="icones">
            <a href="https://twitter.com/" class="twitter"><img
                    src="https://img.icons8.com/stickers/55/000000/twitter.png"></a>
            <a href="https://www.facebook.com/" class="face"><img
                    src="https://img.icons8.com/stickers/55/000000/facebook.png"></a>
            <a href="https://www.instagram.com" class="insta"><img
                    src="https://img.icons8.com/stickers/55/000000/instagram-new--v2.png"></a>
            <a href="mailto:davi.rvianna@hotmail.com" class="email"><img
                    src="https://img.icons8.com/stickers/55/000000/apple-mail.png"></a>
        </div>
    </header>

    <div class="login1">
        <div class="login-esquerdo">
            <h1>[Entre agora]<br> [E aproveite tudo que a "org" tem a oferecer]</h1>
            <img src="hacker.svg" class="imagem-login" alt="hacker animation">
        </div>
        <div class="login-direito">
            <div class="area-de-login">
                <H2>LOGIN</H2>
                <div class="text-area">
                    <label class="later" for="user">Usuário:</label>
                    <input type="text" name="user" placeholder="Email/Usuário">
                </div>

                <div class="text-area">
                    <label class="later" for="Senha">Senha:</label>
                    <input type="password" name="Senha" placeholder="Senha">
                </div>
                <a href="https://th.bing.com/th/id/OIP.Lb02lOHWh0bHeT48GxLn2QHaDf?pid=ImgDet&rs=1">
                    <button class="botao-login">Entrar</button>
                </a>
            </div>
        </main>
            <footer>
                <div class="rodape">
                    <p>Todos os Direitos Reservados para<a href="https://github.com/DevDaviRV" class="git"><em> .DevDaviRV</em></a></p>
                </div>
            </footer>

</body>
